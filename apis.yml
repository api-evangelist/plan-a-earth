aid: plan-a-earth
name: Plan A
description: >-
  Plan A is a Berlin-headquartered enterprise sustainability software company,
  founded in 2017, building an end-to-end decarbonization platform for large
  organizations across Europe, the UK, and North America. The Plan A platform
  combines carbon accounting (Scope 1, 2, and 3 emissions measurement aligned
  with the GHG Protocol), regulatory reporting (CSRD / ESRS, EU Taxonomy,
  CSDDD, UK SDR, US SEC climate disclosure, CBAM), and decarbonization
  planning (science-based target setting, abatement modelling, and
  forecasting). Customers include Sorare, KFC, Visa, BMW, Alphabet, and
  Mollie, served from offices in Berlin, Paris, and London. The platform is
  TUV Rheinland-certified and the company is a certified B Corporation. Plan
  A markets a Carbon Scanner, a Decarbonisation Savings Calculator, an
  Academy, a Whitepaper Centre, and a Regulation Centre as public-facing
  surfaces; the core carbon-accounting and reporting product is sold via
  enterprise contract and is not exposed as a public developer API. Plan A
  references "custom APIs" for client data integration in case-study
  material, but does not publish a developer portal, an OpenAPI specification,
  a public SDK, or an open-source GitHub organization. There is therefore no
  self-serve API surface to profile; this entry indexes Plan A as a
  decarbonization-platform provider for the API Evangelist sustainability
  landscape.
